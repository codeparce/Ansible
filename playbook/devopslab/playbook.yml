---
- name: Configurar servidor Kubernetes base
  hosts: devopslab
  become: true

  tasks:

    - name: Actualizar apt
      apt:
        update_cache: yes
        upgrade: dist

    - name: Instalar paquetes base
      apt:
        name:
          - openssh-server
          - ca-certificates
          - curl
          - git
          - jq 
          - gettext-base 
          - gnupg
          - lsb-release
        state: present

    - name: Habilitar y arrancar SSH
      service:
        name: ssh
        state: started
        enabled: yes

    # =========================
    # INSTALACIÓN DOCKER
    # =========================

    - name: Agregar clave GPG Docker
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Agregar repositorio Docker
      apt_repository:
        repo: >
          deb [arch=amd64]
          https://download.docker.com/linux/ubuntu
          {{ ansible_distribution_release }} stable
        state: present

    - name: Instalar Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: yes

    - name: Habilitar Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Asegurar que el grupo docker exista
      group:
        name: docker
        state: present

    - name: Agregar usuario al grupo docker
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes

    # =========================
    # CONFIGURAR LOGS DOCKER
    # =========================

    - name: Configurar logging driver json-file
      copy:
        dest: /etc/docker/daemon.json
        content: |
          {
            "log-driver": "json-file",
            "log-opts": {
              "max-size": "10m",
              "max-file": "3"
            }
          }
        owner: root
        group: root
        mode: '0644'
      notify: Restart docker


  handlers:
    - name: Restart docker
      service:
        name: docker
        state: restarted