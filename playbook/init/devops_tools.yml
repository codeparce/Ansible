---
- name: Configurar Herramientas DevOps
  hosts: devopslab
  become: true

  tasks:
    - name: Actualizar apt
      apt:
        update_cache: yes
        upgrade: dist

    # =========================
    # PAQUETES BASE
    # =========================
    - name: Instalar paquetes base
      apt:
        name:
          - openssh-server
          - ca-certificates
          - curl
          - git
          - jq 
          - gettext-base 
          - software-properties-common
          - gnupg
          - lsb-release
        update_cache: yes
        state: present

    # =========================
    # BUN
    # =========================
    - name: Instalar Bun
      shell: curl -fsSL https://bun.sh/install | bash
      args:
        creates: /home/vagrant/.bun/bin/bun
      become: no

    # =========================
    # TERRAFORM
    # =========================
    - name: Agregar clave GPG de HashiCorp
      get_url:
        url: https://apt.releases.hashicorp.com/gpg
        dest: /tmp/hashicorp.gpg

    - name: Convertir clave a keyring
      command: >
        gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg /tmp/hashicorp.gpg
      args:
        creates: /usr/share/keyrings/hashicorp-archive-keyring.gpg

    - name: Agregar repositorio de HashiCorp
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com {{ ansible_distribution_release }} main"
        filename: hashicorp
        state: present

    - name: Instalar Terraform
      apt:
        name: terraform
        state: present
        update_cache: yes

    # =========================
    # INSTALACIÓN DOCKER
    # =========================

    - name: Agregar clave GPG Docker
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Agregar repositorio Docker
      apt_repository:
        repo: >
          deb [arch=amd64]
          https://download.docker.com/linux/ubuntu
          {{ ansible_distribution_release }} stable
        state: present

    - name: Instalar Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: yes

    - name: Habilitar Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Asegurar que el grupo docker exista
      group:
        name: docker
        state: present

    - name: Agregar usuario al grupo docker
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes

    # CONFIGURAR LOGS DOCKER
    - name: Configurar logging driver json-file
      copy:
        dest: /etc/docker/daemon.json
        content: |
          {
            "log-driver": "json-file",
            "log-opts": {
              "max-size": "10m",
              "max-file": "3"
            }
          }
        owner: root
        group: root
        mode: '0644'
      notify: Restart docker


  handlers:
    - name: Restart docker
      service:
        name: docker
        state: restarted